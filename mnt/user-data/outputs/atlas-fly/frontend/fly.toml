# ATLAS GeoSentinel — Frontend (Next.js)
# Deploy: cd frontend && fly deploy

app = "atlas-frontend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  # Set your backend URL:
  # fly secrets set NEXT_PUBLIC_API_URL=https://atlas-backend.fly.dev

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false    # always-on
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
